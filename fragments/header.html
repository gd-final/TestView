<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
  <!-- 사용 예시: <div th:replace="fragments/header :: header"></div> -->
  <th:block th:fragment="header">
    <header class="gh">
      <div class="gh__wrap">
        <a href="/" th:href="@{/}" class="gh__brand" aria-label="Goodee B2B 홈">
          <svg class="gh__brand-icon" width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <rect width="28" height="28" rx="6" fill="#1c3d5a"/>
            <rect x="6" y="6" width="7" height="7" rx="1" fill="#fff" opacity="0.9"/>
            <rect x="15" y="6" width="7" height="7" rx="1" fill="#fff" opacity="0.6"/>
            <rect x="6" y="15" width="7" height="7" rx="1" fill="#fff" opacity="0.6"/>
            <rect x="15" y="15" width="7" height="7" rx="1" fill="#4da6e8" opacity="0.9"/>
          </svg>
          <span class="gh__brand-name">Goodee <strong>B2B</strong></span>
        </a>

        <form class="gh__search" action="/search" th:action="@{/search}" method="get" role="search">
          <div class="gh__search-box">
            <button type="submit" class="gh__search-submit" aria-label="검색">
              <i class="fas fa-search" aria-hidden="true"></i>
            </button>
            <input
              type="search"
              name="q"
              class="gh__search-input"
              placeholder="품목명, 카테고리, 품번으로 검색"
              aria-label="상품 검색"
              autocomplete="off"
            >
            <div class="gh__search-divider" aria-hidden="true"></div>
            <select name="searchType" class="gh__search-select" aria-label="검색 기준 선택">
              <option value="">전체</option>
              <option value="product">상품명</option>
              <option value="tag">태그</option>
            </select>
          </div>

          <div class="gh-search-layer" id="ghSearchLayer" aria-hidden="true">
            <section class="gh-search-layer__section" aria-labelledby="ghRecentTitle">
              <div class="gh-search-layer__head">
                <strong class="gh-search-layer__title" id="ghRecentTitle">최근 검색어</strong>
                <button type="button" class="gh-search-layer__clear" id="ghRecentClearBtn">전체 삭제</button>
              </div>
              <ul class="gh-search-layer__recent-list" id="ghRecentList" role="list"></ul>
              <p class="gh-search-layer__empty" id="ghRecentEmpty" hidden>최근 검색어가 없습니다.</p>
            </section>
            <section class="gh-search-layer__section" aria-labelledby="ghPopularTitle">
              <div class="gh-search-layer__head">
                <strong class="gh-search-layer__title" id="ghPopularTitle">실시간 인기 검색어</strong>
                <button type="button" class="gh-search-layer__more" id="ghPopularToggleBtn" aria-expanded="false">더보기</button>
              </div>
              <ol class="gh-search-layer__popular-list" id="ghPopularList"></ol>
            </section>
          </div>
        </form>

        <div class="gh-hot" id="ghHotWidget">
          <button
            type="button"
            class="gh-hot__trigger"
            id="ghHotTriggerBtn"
            aria-label="주간 인기 검색어 전체 보기"
            aria-expanded="false"
            aria-controls="ghHotPanel"
          >
            <span class="gh-hot__slot" id="ghHotCurrent" aria-live="polite">
              <span class="gh-hot__label">주간 인기 검색어</span>
              <span class="gh-hot__item">
                <span class="gh-hot__rank">10위</span>
                <span class="gh-hot__keyword">명함 케이스</span>
              </span>
            </span>
            <span class="gh-hot__toggle-mark" aria-hidden="true">
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </span>
          </button>
          <div class="gh-hot__panel" id="ghHotPanel" aria-hidden="true">
            <div class="gh-hot__panel-head">
              <strong class="gh-hot__panel-title">주간 인기 검색어</strong>
              <button type="button" class="gh-hot__close" id="ghHotCloseBtn" aria-label="주간 인기 검색어 닫기">
                <i class="fas fa-times" aria-hidden="true"></i>
              </button>
            </div>
            <ol class="gh-hot__list" id="ghHotList"></ol>
          </div>
        </div>

        <nav class="gh__util" aria-label="유틸 메뉴">
          <a href="/login" th:href="@{/login}" class="gh__util-btn">
            <i class="fas fa-user" aria-hidden="true"></i>
            <span>로그인</span>
          </a>
          <a href="/mypage" th:href="@{/mypage}" class="gh__util-btn">
            <i class="fas fa-th-large" aria-hidden="true"></i>
            <span>마이페이지</span>
          </a>
          <a href="/order/track" th:href="@{/order/track}" class="gh__util-btn">
            <i class="fas fa-shipping-fast" aria-hidden="true"></i>
            <span>배송조회</span>
          </a>
          <a href="/notifications" th:href="@{/notifications}" class="gh__util-btn gh__util-btn--notify" id="ghNotifyBtn" aria-label="알림" aria-expanded="false" aria-controls="ghNotifyModal">
            <i class="fas fa-bell" aria-hidden="true"></i>
            <span>알림</span>
          </a>
          <a href="/cart" th:href="@{/cart}" class="gh__util-btn gh__util-btn--cart" aria-label="장바구니 3개">
            <i class="fas fa-shopping-cart" aria-hidden="true"></i>
            <span>장바구니</span>
            <em class="gh__cart-badge" th:text="${cartCount}">3</em>
          </a>
        </nav>
      </div>
    </header>

    <div class="cat-strip" role="navigation" aria-label="카테고리 탐색">
      <div class="cat-strip__scroll" id="v3CatNav">
        <div class="cat-all" id="v3CatAll">
          <a href="/category" th:href="@{/category}" class="cat-all__btn cat-trigger" data-cat-key="all" aria-expanded="false" aria-controls="v3CatMega" aria-label="전체 카테고리">
            <i class="fas fa-grip-horizontal" aria-hidden="true"></i>
            <span>전체</span>
          </a>
        </div>

        <ul class="cat-chips" role="list">
          <li><a href="/category/office" th:href="@{/category/office}" class="cat-chip cat-trigger" data-cat-key="office" aria-expanded="false" aria-controls="v3CatMega"><i class="fas fa-pencil-alt" aria-hidden="true"></i> 사무용품</a></li>
          <li><a href="/category/daily" th:href="@{/category/daily}" class="cat-chip cat-trigger" data-cat-key="daily" aria-expanded="false" aria-controls="v3CatMega"><i class="fas fa-home" aria-hidden="true"></i> 생활용품</a></li>
          <li><a href="/category/kitchen" th:href="@{/category/kitchen}" class="cat-chip cat-trigger" data-cat-key="kitchen" aria-expanded="false" aria-controls="v3CatMega"><i class="fas fa-utensils" aria-hidden="true"></i> 주방용품</a></li>
          <li><a href="/category/digital" th:href="@{/category/digital}" class="cat-chip cat-trigger" data-cat-key="digital" aria-expanded="false" aria-controls="v3CatMega"><i class="fas fa-laptop" aria-hidden="true"></i> 디지털/가전</a></li>
          <li><a href="/category/package" th:href="@{/category/package}" class="cat-chip cat-trigger" data-cat-key="package" aria-expanded="false" aria-controls="v3CatMega"><i class="fas fa-box" aria-hidden="true"></i> 포장/배송</a></li>
          <li><a href="/category/promo" th:href="@{/category/promo}" class="cat-chip cat-trigger" data-cat-key="promo" aria-expanded="false" aria-controls="v3CatMega"><i class="fas fa-gift" aria-hidden="true"></i> 판촉물</a></li>
          <li><a href="/category/season" th:href="@{/category/season}" class="cat-chip cat-trigger" data-cat-key="season" aria-expanded="false" aria-controls="v3CatMega"><i class="fas fa-snowflake" aria-hidden="true"></i> 시즌상품</a></li>
          <li><a href="/category/cleaning" th:href="@{/category/cleaning}" class="cat-chip cat-trigger" data-cat-key="cleaning" aria-expanded="false" aria-controls="v3CatMega"><i class="fas fa-broom" aria-hidden="true"></i> 청소/위생</a></li>
        </ul>

        <a href="/bulk-order" th:href="@{/bulk-order}" class="cat-strip__cta">
          <i class="fas fa-file-invoice-dollar" aria-hidden="true"></i> 대량견적
        </a>
      </div>
      <div class="cat-mega" id="v3CatMega" aria-hidden="true">
        <div class="cat-mega__inner">
          <div class="cat-mega__tree" id="v3CatMegaTree"></div>
        </div>
      </div>
    </div>

    <div class="gh-notify-modal" id="ghNotifyModal" aria-hidden="true">
      <div class="gh-notify-modal__backdrop"></div>
      <section class="gh-notify-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="ghNotifyTitle">
        <div class="gh-notify-modal__head">
          <div>
            <strong class="gh-notify-modal__title" id="ghNotifyTitle">알림 내역</strong>
            <p class="gh-notify-modal__sub">최근 확인이 필요한 주문·배송·문의 알림입니다.</p>
          </div>
          <button type="button" class="gh-notify-modal__close" id="ghNotifyCloseBtn" aria-label="알림 모달 닫기">
            <i class="fas fa-times" aria-hidden="true"></i>
          </button>
        </div>
        <div class="gh-notify-modal__list" id="ghNotifyList"></div>
      </section>
    </div>
  </th:block>
</body>
</html>
